<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reco - Récolement CDI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librairie scanner caméra -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Firebase SDK (version compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvMFa8D9FtOkirqyq4rNQ1etuw45v2BiU",
            authDomain: "recolement974.firebaseapp.com",
            projectId: "recolement974",
            storageBucket: "recolement974.firebasestorage.app",
            messagingSenderId: "940735072436",
            appId: "1:940735072436:web:bba1a5f9f724636cdbafe1",
            measurementId: "G-68GLWQQC9V"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const analytics = firebase.analytics();
        
        window.db = db;
        window.firebaseApp = firebase.app();
        
        console.log('✅ Firebase initialisé avec succès');
    </script>
</head>
<body>

<!-- Écran de connexion UAI -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>📚 Reco</h1>
        <p>Application de récolement CDI</p>
        <label for="uaiInput">Code UAI de l'établissement</label>
        <input type="text" id="uaiInput" placeholder="Ex: 974001A" maxlength="9" autocomplete="off">
        <button id="loginBtn">Accéder</button>
        <div id="loginError" class="login-error"></div>
    </div>
</div>

<!-- Application principale (cachée au départ) -->
<div id="mainApp" style="display: none;">
    <div class="header">
        <div class="header-left">
            <div class="hamburger-menu" id="hamburgerMenu">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h2>Reco <span id="currentUAI" class="uai-badge"></span></h2>
        </div>

        <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
        
        <nav class="mobile-nav" id="mobileNav">
            <div class="mobile-nav-header">
                <h3>Menu</h3>
                <button class="close-menu" id="closeMenuBtn">✖</button>
            </div>
            <div class="mobile-nav-content">
                <button id="cameraScanBtnMobile" class="mobile-nav-btn">
                    <span class="btn-icon">📷</span>
                    <span class="btn-text">Scanner caméra</span>
                </button>
                <button id="saveBtnTopMobile" class="mobile-nav-btn">
                    <span class="btn-icon">📤</span>
                    <span class="btn-text">Exporter l'onglet</span>
                </button>
                <button id="saveAllBtnTopMobile" class="mobile-nav-btn">
                    <span class="btn-icon">📦</span>
                    <span class="btn-text">Exporter tous</span>
                </button>
                <button id="replaceTabsBtnMobile" class="mobile-nav-btn">
                    <span class="btn-icon">🔄</span>
                    <span class="btn-text">Remplacer onglets</span>
                </button>
                <button id="resetBtnTopMobile" class="mobile-nav-btn">
                    <span class="btn-icon">🗑️</span>
                    <span class="btn-text">Réinitialiser</span>
                </button>
                <button id="statsBtnMobile" class="mobile-nav-btn">
                    <span class="btn-icon">📊</span>
                    <span class="btn-text">Statistiques</span>
                </button>
                <button id="themeBtnTopMobile" class="mobile-nav-btn">
                    <span class="btn-icon">🌙</span>
                    <span class="btn-text">Mode nuit</span>
                </button>
                <button id="logoutBtnMobile" class="mobile-nav-btn logout-btn">
                    <span class="btn-icon">🚪</span>
                    <span class="btn-text">Changer d'établissement</span>
                </button>
            </div>
        </nav>

        <div class="toolbar desktop-toolbar">
            <button id="cameraScanBtn" class="icon-btn" data-tooltip="Scanner avec la caméra">📷</button>
            <button id="saveBtnTop" class="icon-btn" data-tooltip="Exporter l'onglet actuel">📤</button>
            <button id="saveAllBtnTop" class="icon-btn" data-tooltip="Exporter tous les onglets">📦</button>
            <button id="replaceTabsBtn" class="icon-btn" data-tooltip="Remplacer tous les onglets">🔄</button>
            <button id="resetBtnTop" class="icon-btn" data-tooltip="Réinitialiser tous les onglets">🗑️</button>
            <button id="statsBtn" class="icon-btn" data-tooltip="Statistiques">📊</button>
            <button id="themeBtnTop" class="icon-btn" data-tooltip="Mode nuit">🌙</button>
            <button id="logoutBtn" class="icon-btn" data-tooltip="Changer d'établissement">🚪</button>
        </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <textarea id="note" placeholder="─── Scannez vos documents ici ───
L'application enregistre automatiquement et se synchronise entre tous les appareils du même établissement.

Vous pouvez :
– créer, renommer/supprimer (clic droit) ou déplacer les onglets
– voir les onglets remplis (point vert)
– exporter vos données
– scanner avec la caméra (bouton 📷)
– la touche Tab est automatiquement convertie en retour à la ligne
"></textarea>

    <div id="syncStatus" class="sync-status">
        <span class="sync-icon">☁️</span>
        <span class="sync-text">Synchronisé</span>
    </div>

    <footer class="app-footer">
        <div class="footer-left">
            <select id="fontSizeSelect">
                <option value="16">16 px</option>
                <option value="24">24 px</option>
                <option value="32">32 px</option>
                <option value="48">48 px</option>
                <option value="64">64 px</option>
            </select>
        </div>
        <div class="footer-right">
            <div id="saveFeedback">💾 Sauvegardé</div>
            <div id="lineCount">0 ligne</div>
        </div>
    </footer>
</div>

<div id="contextMenu">
    <div id="renameOption">✏️ Renommer</div>
    <div id="deleteOption">🗑️ Supprimer</div>
</div>

<div id="replaceModal" class="modal">
    <div class="modal-content">
        <h3>Remplacer tous les onglets</h3>
        <p>Entrez un nom d'onglet par ligne :</p>
        <textarea id="replaceInput"></textarea>
        <div class="modal-buttons">
            <button id="replaceCancel">Annuler</button>
            <button id="replaceConfirm">Valider</button>
        </div>
    </div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <h3>Statistiques</h3>
        <pre id="statsOutput"></pre>
        <div class="modal-buttons">
            <button id="statsSave">Enregistrer</button>
            <button id="statsClose">Fermer</button>
        </div>
    </div>
</div>

<script src="js/storage.js"></script>
<script src="js/sync.js"></script>
<script src="js/auth.js"></script>
<script src="js/tabs.js"></script>
<script src="js/editor.js"></script>
<script src="js/ui.js"></script>
<script src="js/theme.js"></script>
<script src="js/scanner-camera.js"></script>
<script src="js/mobile-menu.js"></script>
<script src="js/app.js"></script>
</body>
</html>
